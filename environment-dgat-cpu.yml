name: eccb-dgat-official
channels:
  - conda-forge
  - nodefaults
dependencies:
  # DGAT's upstream repository targets Python 3.11. Keep this environment
  # separate from the Python 3.10 tutorial/Jupyter environment.
  - python=3.11
  - pip
  - pip:
      - anndata==0.11.4
      - matplotlib==3.10.3
      - muon==0.1.7
      - numpy==1.25.2
      - pandas==2.3.0
      - scanpy==1.11.2
      - scikit-learn==1.2.0
      - scipy==1.16.0
      - seaborn==0.13.2
      - torch==2.0.1
      - torch-geometric==2.6.1
      - tqdm==4.64.1
      - igraph
      - leidenalg
